name: study_hub
description: "App pessoal de gerenciamento de estudos com integração Google Calendar e Notion."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Ícones
  cupertino_icons: ^1.0.8

  # Google APIs (Calendar)
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  google_sign_in: ^6.2.2

  # HTTP para Notion API
  http: ^1.3.0

  # Armazenamento seguro (tokens)
  flutter_secure_storage: ^9.2.4

  # Preferências simples (tema, flags)
  shared_preferences: ^2.5.0

  # Gerenciamento de estado
  provider: ^6.1.5

  # Formatação de datas
  intl: ^0.20.0

  # IDs únicos
  uuid: ^4.5.1

  # Tipografia moderna
  google_fonts: ^6.2.1

  # Environment variables
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
